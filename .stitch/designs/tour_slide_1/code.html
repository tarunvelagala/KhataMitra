<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#ffffff",
                        "primary": "#004d99",
                        "on-surface-variant": "#424752",
                        "tertiary-fixed": "#ffdad6",
                        "on-surface": "#191c1e",
                        "surface-container-low": "#f3f4f6",
                        "background": "#f8f9fb",
                        "on-primary-fixed-variant": "#00468c",
                        "surface-dim": "#d9dadc",
                        "secondary-fixed": "#a3f69c",
                        "on-secondary-fixed-variant": "#005312",
                        "tertiary-fixed-dim": "#ffb4ac",
                        "primary-fixed-dim": "#a9c7ff",
                        "on-tertiary-container": "#ffddd9",
                        "surface-variant": "#e1e2e4",
                        "on-background": "#191c1e",
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "primary-container": "#1565c0",
                        "on-secondary-fixed": "#002204",
                        "surface": "#f8f9fb",
                        "surface-container-highest": "#e1e2e4",
                        "inverse-on-surface": "#f0f1f3",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#410003",
                        "on-tertiary-fixed-variant": "#93000e",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#727783",
                        "on-secondary-container": "#217128",
                        "primary-fixed": "#d6e3ff",
                        "surface-container": "#edeef0",
                        "secondary-container": "#a0f399",
                        "surface-container-high": "#e7e8ea",
                        "on-primary-fixed": "#001b3d",
                        "error": "#ba1a1a",
                        "secondary": "#1b6d24",
                        "tertiary": "#a00312",
                        "secondary-fixed-dim": "#88d982",
                        "on-error": "#ffffff",
                        "inverse-primary": "#a9c7ff",
                        "surface-tint": "#005db7",
                        "surface-bright": "#f8f9fb",
                        "tertiary-container": "#c42627",
                        "outline-variant": "#c2c6d4",
                        "on-primary-container": "#dae5ff",
                        "inverse-surface": "#2e3132"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "display": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .perspective-1000 { perspective: 1000px; }
        .rotate-y-12 { transform: rotateY(-12deg) rotateX(4deg); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#f2f3f5] text-on-surface font-body selection:bg-primary-fixed overflow-hidden h-screen flex flex-col">
<!-- Top Navigation (Contextual Suppression Logic Applied: Shared Component mapped for Tour identity) -->
<header class="bg-transparent backdrop-blur-xl text-blue-900 dark:text-blue-200 font-manrope font-bold text-lg tracking-tight docked full-width top-0 z-50 flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#004d99]" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="font-manrope font-extrabold text-[#004d99]">KhataPro</span>
</div>
<button class="text-slate-500 font-inter text-sm tracking-wide hover:opacity-90 transition-opacity">Skip</button>
</header>
<!-- Main Onboarding Content -->
<main class="flex-grow flex flex-col items-center justify-center px-8 pb-32">
<!-- Progress Indicators -->
<div class="flex gap-2 mb-12">
<div class="w-2.5 h-2.5 rounded-full bg-primary-container"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Hero: Tilted Smartphone Wireframe -->
<div class="relative w-64 h-[440px] perspective-1000 mb-12">
<div class="w-full h-full border-[6px] border-on-surface rounded-[3rem] bg-surface-container-lowest shadow-2xl rotate-y-12 overflow-hidden flex flex-col p-4 relative">
<!-- Phone UI Header -->
<div class="h-1 w-12 bg-surface-container-highest rounded-full mx-auto mb-6"></div>
<div class="flex justify-between items-center mb-6 px-2">
<div class="w-8 h-8 rounded-full bg-surface-container-low"></div>
<div class="w-12 h-2 bg-surface-container-low rounded-full"></div>
</div>
<!-- Phone Ledger List -->
<div class="space-y-4">
<!-- Row 1: Credit -->
<div class="p-4 bg-surface-container-low rounded-xl flex justify-between items-center">
<div class="space-y-1">
<div class="w-16 h-2.5 bg-on-surface/10 rounded-full"></div>
<div class="w-10 h-2 bg-on-surface/5 rounded-full"></div>
</div>
<span class="text-[#2e7d32] font-headline font-bold text-sm tracking-tight">+₹1,250</span>
</div>
<!-- Row 2: Debit -->
<div class="p-4 bg-surface-container-low rounded-xl flex justify-between items-center">
<div class="space-y-1">
<div class="w-20 h-2.5 bg-on-surface/10 rounded-full"></div>
<div class="w-8 h-2 bg-on-surface/5 rounded-full"></div>
</div>
<span class="text-primary font-headline font-bold text-sm tracking-tight">-₹400</span>
</div>
</div>
<!-- Phone FAB -->
<div class="absolute bottom-8 right-8 w-12 h-12 rounded-full bg-primary-container flex items-center justify-center shadow-lg text-white">
<span class="material-symbols-outlined" data-icon="add" style="font-variation-settings: 'FILL' 1;">add</span>
</div>
</div>
<!-- Atmospheric Shadow Gradient -->
<div class="absolute -bottom-10 left-1/2 -translate-x-1/2 w-48 h-6 bg-on-surface/5 blur-xl rounded-[100%]"></div>
</div>
<!-- Copy Section -->
<div class="text-center max-w-xs space-y-4">
<h1 class="font-headline font-extrabold text-3xl text-on-surface tracking-tight leading-tight">
                Track every rupee
            </h1>
<p class="font-body text-slate-500 text-base leading-relaxed">
                Add customers, record what they owe you or you owe them. Balances update instantly.
            </p>
</div>
<!-- Swipe Hint -->
<div class="mt-12 flex flex-col items-center gap-2 opacity-30 animate-pulse">
<span class="font-label text-[10px] tracking-[0.2em] font-bold text-on-surface">SWIPE TO EXPLORE</span>
<div class="flex gap-1">
<span class="material-symbols-outlined text-sm" data-icon="chevron_right">chevron_right</span>
<span class="material-symbols-outlined text-sm" data-icon="chevron_right">chevron_right</span>
</div>
</div>
</main>
<!-- Sticky Footer (Shared Component mapped for Transactional/Onboarding focus) -->
<footer class="fixed bottom-0 w-full bg-white/95 backdrop-blur-2xl rounded-t-[32px] shadow-[0_-8px_32px_0_rgba(25,28,30,0.06)] z-50 flex flex-col items-center gap-4 p-8">
<button class="w-full max-w-sm h-14 bg-gradient-to-br from-[#004d99] to-[#1565C0] text-white font-headline font-bold text-lg rounded-full shadow-lg shadow-primary-container/20 active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
            Next
            <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="text-slate-600 font-inter text-sm tracking-wide hover:opacity-90 transition-opacity pb-2">
            Skip
        </button>
<!-- Copyright Anchor (From Shared Component JSON) -->
<p class="text-[10px] text-slate-400 font-inter tracking-widest uppercase">The Architectural Ledger © 2024</p>
</footer>
</body></html>
