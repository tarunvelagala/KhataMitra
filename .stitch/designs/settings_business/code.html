<style>
        body {
            font-family: 'Work Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#faf9fd] dark:bg-[#121316] border-b border-[#C4C6CF] dark:border-[#424752] docked full-width top-0 z-50">
<div class="flex justify-between items-center w-full px-6 h-16">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-all duration-200 text-[#004d99] dark:text-[#a9c7ff]">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-['Work_Sans'] text-on-surface dark:text-on-surface-variant font-bold text-lg">Business Profile</h1>
</div>
<button class="active:scale-95 transition-all duration-200 text-[#1565c0] font-semibold font-['Work_Sans']">
                Save
            </button>
</div>
</header>
<!-- Content Canvas -->
<main class="flex-grow w-full max-w-md mx-auto px-screen-margin pt-xl pb-32">
<!-- Business Logo Section -->
<section class="flex flex-col items-center justify-center mb-section-gap">
<div class="w-[120px] h-[120px] rounded-full border-2 border-dashed border-outline-variant flex flex-col items-center justify-center bg-surface-container-low hover:bg-surface-container transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-outline text-3xl group-hover:text-primary transition-colors">add_a_photo</span>
</div>
<p class="mt-md text-on-surface-variant font-label-lg text-label-lg">Tap to upload logo</p>
</section>
<!-- Form Section -->
<div class="space-y-lg">
<!-- Business Name -->
<div class="flex flex-col gap-xs">
<label class="font-title-sm text-title-sm text-on-surface-variant ml-xs">Business Name *</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-input-h top-1/2 -translate-y-1/2 text-on-surface-variant">store</span>
<input class="w-full h-[64px] pl-[52px] pr-input-h bg-surface-container-high rounded-xl border-none focus:ring-2 focus:ring-primary text-body-lg font-body-lg text-on-surface placeholder:text-outline" type="text" value="My Kirana Store"/>
</div>
</div>
<!-- Business Type -->
<div class="flex flex-col gap-xs">
<label class="font-title-sm text-title-sm text-on-surface-variant ml-xs">Business Type</label>
<div class="relative group cursor-pointer">
<span class="material-symbols-outlined absolute left-input-h top-1/2 -translate-y-1/2 text-on-surface-variant">category</span>
<select class="w-full h-[64px] pl-[52px] pr-[52px] bg-surface-container-high rounded-xl border-none focus:ring-2 focus:ring-primary text-body-lg font-body-lg text-on-surface appearance-none">
<option selected="">Kirana Store</option>
<option>Wholesale</option>
<option>Restaurant</option>
<option>Apparel</option>
</select>
<span class="material-symbols-outlined absolute right-input-h top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Owner Name -->
<div class="flex flex-col gap-xs">
<label class="font-title-sm text-title-sm text-on-surface-variant ml-xs">Owner Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-input-h top-1/2 -translate-y-1/2 text-on-surface-variant">person</span>
<input class="w-full h-[64px] pl-[52px] pr-input-h bg-surface-container-high rounded-xl border-none focus:ring-2 focus:ring-primary text-body-lg font-body-lg text-on-surface" type="text" value="Ramesh Kumar"/>
</div>
</div>
<!-- Phone -->
<div class="flex flex-col gap-xs">
<label class="font-title-sm text-title-sm text-on-surface-variant ml-xs">Phone</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-input-h top-1/2 -translate-y-1/2 text-on-surface-variant">call</span>
<input class="w-full h-[64px] pl-[52px] pr-input-h bg-surface-container-high rounded-xl border-none focus:ring-2 focus:ring-primary text-body-lg font-body-lg text-on-surface" type="tel" value="+91 98765 43210"/>
</div>
</div>
</div>
<!-- Utility Info -->
<div class="mt-xl p-lg bg-surface-container-low rounded-xl flex items-start gap-md">
<span class="material-symbols-outlined text-primary">info</span>
<p class="text-body-sm font-body-sm text-on-surface-variant">
                Your business details will be visible on invoices and digital receipts shared with customers.
            </p>
</div>
</main>
<!-- Sticky Bottom CTA -->
<div class="fixed bottom-0 left-0 right-0 p-screen-margin bg-gradient-to-t from-background via-background/90 to-transparent pt-lg z-40">
<div class="max-w-md mx-auto safe-bottom">
<button class="w-full h-[56px] bg-primary text-on-primary font-title-md text-title-md rounded-full shadow-lg active:scale-95 transition-all flex items-center justify-center gap-md">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                Save Changes
            </button>
</div>
</div>
<!-- BottomNavBar -->
<nav class="bg-[#faf9fd] dark:bg-[#121316] border-t border-[#C4C6CF] dark:border-[#424752] fixed bottom-0 w-full z-50 hidden md:flex">
<div class="flex justify-around items-center w-full h-20 pb-safe max-w-md mx-auto">
<div class="flex flex-col items-center justify-center text-[#424752] dark:text-[#C4C6CF] hover:bg-[#EFEDF1] dark:hover:bg-[#1A1B1E] transition-all duration-200 active:scale-95 p-2 rounded-xl">
<span class="material-symbols-outlined">home</span>
<span class="font-['Work_Sans'] text-[12px] font-medium">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-[#424752] dark:text-[#C4C6CF] hover:bg-[#EFEDF1] dark:hover:bg-[#1A1B1E] transition-all duration-200 active:scale-95 p-2 rounded-xl">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-['Work_Sans'] text-[12px] font-medium">Transactions</span>
</div>
<div class="flex flex-col items-center justify-center text-[#424752] dark:text-[#C4C6CF] hover:bg-[#EFEDF1] dark:hover:bg-[#1A1B1E] transition-all duration-200 active:scale-95 p-2 rounded-xl">
<span class="material-symbols-outlined">group</span>
<span class="font-['Work_Sans'] text-[12px] font-medium">Customers</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#1565c0] text-white rounded-2xl px-4 py-1 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings</span>
<span class="font-['Work_Sans'] text-[12px] font-medium">Settings</span>
</div>
</div>
</nav>
</body></html>
