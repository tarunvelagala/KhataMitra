    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-40 bg-surface flex items-center justify-between px-6 h-16 border-none transition-colors duration-200 ease-in-out">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 rounded-full hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[#004d99]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Work_Sans'] font-bold text-[22px] leading-[28px] text-[#004d99]">Transaction Details</h1>
</div>
<div class="flex items-center gap-1">
<button class="p-2 rounded-full hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[#004d99]" data-icon="share">share</span>
</button>
<button class="p-2 rounded-full hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[#004d99]" data-icon="more_vert">more_vert</span>
</button>
</div>
</header>
<main class="flex-grow px-screen-margin pb-32">
<!-- Hero Section -->
<section class="flex flex-col items-center justify-center py-xl">
<div class="mb-2">
<h2 class="font-headline-lg text-headline-lg text-income-green">+₹2,000</h2>
</div>
<div class="bg-income-container px-4 py-1 rounded-full flex items-center gap-1.5">
<span class="material-symbols-outlined text-[14px] text-on-income-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-sm text-label-sm text-on-income-container uppercase tracking-wider">RECEIVED</span>
</div>
</section>
<!-- Customer Row -->
<section class="flex items-center gap-md py-lg mb-4">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center">
<span class="font-title-lg text-title-lg text-on-primary">R</span>
</div>
<div class="flex flex-col">
<span class="font-title-md text-title-md">Ramesh Kumar</span>
<span class="font-body-md text-body-md text-on-surface-variant">+91 98765 43210</span>
</div>
</section>
<!-- Details Card -->
<div class="space-y-4">
<section class="bg-surface-container-lowest rounded-xl p-md border border-outline-variant transition-colors">
<div class="space-y-lg">
<!-- Row: Date -->
<div class="flex items-start gap-md">
<div class="w-10 h-10 rounded-xl bg-surface-container flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-primary" data-icon="calendar_today">calendar_today</span>
</div>
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase">Date</span>
<span class="font-body-lg text-body-lg">April 26, 2026</span>
</div>
</div>
<!-- Row: Note -->
<div class="flex items-start gap-md">
<div class="w-10 h-10 rounded-xl bg-surface-container flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-primary" data-icon="notes">notes</span>
</div>
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase">Note</span>
<span class="font-body-lg text-body-lg leading-relaxed">Grocery payment for March</span>
</div>
</div>
<!-- Row: Type -->
<div class="flex items-start gap-md">
<div class="w-10 h-10 rounded-xl bg-surface-container flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-primary" data-icon="sell">sell</span>
</div>
<div class="flex flex-col items-start">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase">Type</span>
<div class="mt-1 bg-income-container px-3 py-0.5 rounded-full">
<span class="font-label-lg text-label-lg text-on-income-container">Income</span>
</div>
</div>
</div>
</div>
</section>
<!-- Status Card -->
<section class="bg-surface-container-lowest rounded-xl p-md border border-outline-variant">
<div class="flex items-center justify-between">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="payments">payments</span>
<span class="font-title-md text-title-md">Payment Status</span>
</div>
<div class="bg-income-container px-4 py-1 rounded-full">
<span class="font-label-sm text-label-sm text-on-income-container font-bold">PAID</span>
</div>
</div>
</section>
</div>
</main>
<!-- Bottom Actions -->
<div class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-md px-screen-margin py-lg border-none flex gap-md pb-safe">
<button class="flex-1 h-12 border-2 border-primary rounded-xl flex items-center justify-center gap-2 hover:bg-primary/5 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined text-primary" data-icon="edit">edit</span>
<span class="font-label-lg text-label-lg text-primary">Edit</span>
</button>
<button class="flex-1 h-12 bg-tertiary-container rounded-xl flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined text-on-tertiary-container" data-icon="delete">delete</span>
<span class="font-label-lg text-label-lg text-on-tertiary-container">Delete</span>
</button>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 -z-10 opacity-30">
<div class="w-64 h-64 bg-primary-fixed rounded-full blur-[100px]"></div>
</div>
<div class="fixed bottom-0 left-0 -z-10 opacity-30">
<div class="w-64 h-64 bg-secondary-fixed rounded-full blur-[100px]"></div>
</div>
