<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KhataPro Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-expense-container": "#410003",
                        "outline": "#74777F",
                        "on-tertiary-fixed": "#410003",
                        "background": "#faf9fd",
                        "tertiary-container": "#c42627",
                        "on-primary": "#ffffff",
                        "error-signal": "#BA1A1A",
                        "on-income-container": "#002204",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c2c6d4",
                        "surface-container-low": "#f4f3f7",
                        "on-primary-fixed-variant": "#00468c",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb4ac",
                        "primary": "#004d99",
                        "surface-container": "#eeedf1",
                        "on-secondary-fixed": "#002204",
                        "surface-container-highest": "#E3E2E6",
                        "secondary-container": "#a0f399",
                        "surface-dim": "#dad9dd",
                        "income-container": "#A3F69C",
                        "expense-red": "#C62828",
                        "expense-container": "#FFDAD6",
                        "inverse-primary": "#a9c7ff",
                        "secondary-fixed-dim": "#88d982",
                        "primary-container": "#1565c0",
                        "on-secondary-fixed-variant": "#005312",
                        "inverse-on-surface": "#f1f0f4",
                        "surface": "#faf9fd",
                        "on-error-container": "#93000a",
                        "tertiary": "#a00312",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ffdad6",
                        "primary-fixed": "#d6e3ff",
                        "primary-fixed-dim": "#a9c7ff",
                        "error": "#ba1a1a",
                        "surface-bright": "#faf9fd",
                        "on-surface-variant": "#424752",
                        "on-primary-fixed": "#001b3d",
                        "on-surface": "#1a1c1e",
                        "surface-container-high": "#E9E7EC",
                        "on-tertiary-fixed-variant": "#93000e",
                        "surface-variant": "#e3e2e6",
                        "on-tertiary-container": "#ffddd9",
                        "income-green": "#2E7D32",
                        "inverse-surface": "#2f3033",
                        "secondary": "#1b6d24",
                        "on-secondary-container": "#217128",
                        "on-primary-container": "#dae5ff",
                        "on-tertiary": "#ffffff",
                        "on-background": "#1a1c1e",
                        "surface-tint": "#005db7",
                        "secondary-fixed": "#a3f69c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "screen-margin": "24px",
                        "sm": "12px",
                        "lg": "24px",
                        "md": "16px",
                        "xs": "4px",
                        "base": "8px",
                        "section-gap": "32px"
                    },
                    "fontFamily": {
                        "title-lg": ["Work Sans"],
                        "body-lg": ["Work Sans"],
                        "label-sm": ["Work Sans"],
                        "headline-lg": ["Work Sans"],
                        "display-lg": ["Work Sans"],
                        "title-md": ["Work Sans"],
                        "label-lg": ["Work Sans"],
                        "display-md": ["Work Sans"],
                        "body-md": ["Work Sans"],
                        "headline-md": ["Work Sans"]
                    },
                    "fontSize": {
                        "title-lg": ["22px", {"lineHeight": "28px", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0.5px", "fontWeight": "400"}],
                        "label-sm": ["11px", {"lineHeight": "16px", "letterSpacing": "1px", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.5px", "fontWeight": "800"}],
                        "display-lg": ["57px", {"lineHeight": "64px", "letterSpacing": "-0.25px", "fontWeight": "400"}],
                        "title-md": ["16px", {"lineHeight": "24px", "letterSpacing": "0.15px", "fontWeight": "600"}],
                        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600"}],
                        "display-md": ["45px", {"lineHeight": "52px", "fontWeight": "400"}],
                        "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.25px", "fontWeight": "400"}],
                        "headline-md": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.25px", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Work Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .safe-pb {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface antialiased min-h-screen">
<!-- Top App Bar (Shared Component Strategy) -->
<header class="fixed top-0 left-0 w-full z-40 bg-[#faf9fd] dark:bg-[#121316] border-b border-[#C4C6CF] dark:border-[#424752] flex items-center px-6 h-16">
<button class="mr-4 p-2 -ml-2 rounded-full hover:bg-[#EFEDF1] dark:hover:bg-[#2f3033] active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-[#1565C0] dark:text-[#a9c7ff]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Work_Sans'] font-bold text-lg tracking-tight text-[#1565C0] dark:text-[#a9c7ff]">Settings</h1>
</header>
<main class="pt-20 pb-28 px-screen-margin max-w-2xl mx-auto space-y-section-gap">
<!-- Group 1: Business -->
<section>
<h2 class="font-label-lg text-label-lg text-primary mb-md px-base uppercase tracking-widest">Business</h2>
<div class="bg-surface-container-low rounded-xl overflow-hidden border border-outline-variant/30">
<!-- Business Profile -->
<button class="w-full flex items-center p-md hover:bg-surface-container transition-colors duration-200 text-left active:scale-[0.99] transition-transform">
<span class="material-symbols-outlined mr-md text-on-surface-variant" data-icon="store">store</span>
<span class="flex-grow font-title-md text-title-md">Business Profile</span>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</button>
<div class="h-[1px] bg-outline-variant/20 mx-md"></div>
<!-- Language -->
<button class="w-full flex items-center p-md hover:bg-surface-container transition-colors duration-200 text-left active:scale-[0.99] transition-transform">
<span class="material-symbols-outlined mr-md text-on-surface-variant" data-icon="language">language</span>
<div class="flex-grow">
<p class="font-title-md text-title-md">Language</p>
<p class="font-body-md text-body-md text-on-surface-variant">English</p>
</div>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</button>
<div class="h-[1px] bg-outline-variant/20 mx-md"></div>
<!-- Theme -->
<button class="w-full flex items-center p-md hover:bg-surface-container transition-colors duration-200 text-left active:scale-[0.99] transition-transform">
<span class="material-symbols-outlined mr-md text-on-surface-variant" data-icon="brightness_6">brightness_6</span>
<div class="flex-grow">
<p class="font-title-md text-title-md">Theme</p>
<p class="font-body-md text-body-md text-on-surface-variant">System</p>
</div>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<!-- Group 2: Data -->
<section>
<h2 class="font-label-lg text-label-lg text-primary mb-md px-base uppercase tracking-widest">Data</h2>
<div class="bg-surface-container-low rounded-xl overflow-hidden border border-outline-variant/30">
<!-- Backup & Restore -->
<button class="w-full flex items-center p-md hover:bg-surface-container transition-colors duration-200 text-left active:scale-[0.99] transition-transform">
<span class="material-symbols-outlined mr-md text-on-surface-variant" data-icon="backup">backup</span>
<span class="flex-grow font-title-md text-title-md">Backup &amp; Restore</span>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</button>
<div class="h-[1px] bg-outline-variant/20 mx-md"></div>
<!-- Export CSV -->
<button class="w-full flex items-center p-md hover:bg-surface-container transition-colors duration-200 text-left active:scale-[0.99] transition-transform">
<span class="material-symbols-outlined mr-md text-on-surface-variant" data-icon="file_download">file_download</span>
<span class="flex-grow font-title-md text-title-md">Export CSV</span>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<!-- Group 3: About -->
<section>
<h2 class="font-label-lg text-label-lg text-primary mb-md px-base uppercase tracking-widest">About</h2>
<div class="bg-surface-container-low rounded-xl overflow-hidden border border-outline-variant/30">
<!-- Version -->
<div class="w-full flex items-center p-md text-left">
<span class="material-symbols-outlined mr-md text-on-surface-variant" data-icon="info">info</span>
<span class="flex-grow font-title-md text-title-md">Version</span>
<span class="font-body-md text-body-md text-on-surface-variant">1.0.0</span>
</div>
<div class="h-[1px] bg-outline-variant/20 mx-md"></div>
<!-- Privacy Policy -->
<button class="w-full flex items-center p-md hover:bg-surface-container transition-colors duration-200 text-left active:scale-[0.99] transition-transform">
<span class="material-symbols-outlined mr-md text-on-surface-variant" data-icon="privacy_tip">privacy_tip</span>
<span class="flex-grow font-title-md text-title-md">Privacy Policy</span>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</button>
<div class="h-[1px] bg-outline-variant/20 mx-md"></div>
<!-- Licenses -->
<button class="w-full flex items-center p-md hover:bg-surface-container transition-colors duration-200 text-left active:scale-[0.99] transition-transform">
<span class="material-symbols-outlined mr-md text-on-surface-variant" data-icon="description">description</span>
<span class="flex-grow font-title-md text-title-md">Open Source Licenses</span>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<!-- Destructive Section -->
<section class="mt-xl">
<button class="w-full flex items-center p-md bg-tertiary-container/10 border border-tertiary-container/20 rounded-xl hover:bg-tertiary-container/15 transition-colors duration-200 text-left active:scale-[0.99] transition-transform">
<span class="material-symbols-outlined mr-md text-tertiary" data-icon="delete_forever">delete_forever</span>
<span class="flex-grow font-title-md text-title-md text-tertiary">Clear All Data</span>
</button>
<p class="mt-sm px-base font-body-md text-body-md text-on-surface-variant italic">This action is irreversible and will delete all ledger entries.</p>
</section>
</main>
<!-- Bottom Navigation Bar (Shared Component Strategy) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-safe h-20 bg-[#faf9fd] dark:bg-[#121316] border-t border-[#C4C6CF] dark:border-[#424752] z-50">
<!-- Home -->
<button class="flex flex-col items-center justify-center text-[#424752] dark:text-[#C4C6CF] px-5 py-1.5 hover:bg-[#EFEDF1] dark:hover:bg-[#2f3033] rounded-2xl active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Work_Sans'] text-[12px] font-semibold tracking-wide">Home</span>
</button>
<!-- Customers -->
<button class="flex flex-col items-center justify-center text-[#424752] dark:text-[#C4C6CF] px-5 py-1.5 hover:bg-[#EFEDF1] dark:hover:bg-[#2f3033] rounded-2xl active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-['Work_Sans'] text-[12px] font-semibold tracking-wide">Customers</span>
</button>
<!-- Reports -->
<button class="flex flex-col items-center justify-center text-[#424752] dark:text-[#C4C6CF] px-5 py-1.5 hover:bg-[#EFEDF1] dark:hover:bg-[#2f3033] rounded-2xl active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="assessment">assessment</span>
<span class="font-['Work_Sans'] text-[12px] font-semibold tracking-wide">Reports</span>
</button>
<!-- Settings (ACTIVE) -->
<button class="flex flex-col items-center justify-center bg-[#1565C0]/10 dark:bg-[#a9c7ff]/10 text-[#1565C0] dark:text-[#a9c7ff] rounded-2xl px-5 py-1.5 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="settings" style="font-variation-settings: 'FILL' 1;">settings</span>
<span class="font-['Work_Sans'] text-[12px] font-semibold tracking-wide">Settings</span>
</button>
</nav>
</body></html>
