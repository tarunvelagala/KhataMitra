      min-height: max(884px, 100dvh);

<body class="flex flex-col min-h-screen text-on-surface">
<!-- Top App Bar - Shared Component Mapping -->
<header class="sticky top-0 z-50 bg-surface flex items-center w-full px-6 py-4 border-none">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-[#EFEDF1] transition-all duration-200 active:scale-95">
<span class="material-symbols-outlined text-[#1565C0]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Work_Sans'] font-bold text-[22px] leading-[28px] text-[#1565C0]">Select Language</h1>
</div>
</header>
<main class="flex-1 w-full max-w-2xl mx-auto px-screen-margin pb-32">
<!-- Subtitle -->
<div class="py-md">
<p class="font-body-md text-body-md text-on-surface-variant">
                Choose your preferred language. Changes take effect immediately.
            </p>
</div>
<!-- Language Grid -->
<div class="grid grid-cols-2 gap-md mt-sm">
<!-- Card 1 (English) - SELECTED -->
<button class="relative bg-surface-container-lowest p-lg rounded-xl border-2 border-[#1565C0] flex flex-col items-center justify-center gap-xs transition-all duration-200 active:scale-[0.98]">
<div class="absolute top-2 right-2 flex items-center justify-center w-6 h-6 bg-[#1565C0] rounded-full">
<span class="material-symbols-outlined text-white text-[16px]" data-icon="check" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<span class="font-title-md text-title-md font-bold text-on-surface">English</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">EN</span>
</button>
<!-- Card 2 (Hindi) -->
<button class="bg-surface-container-lowest p-lg rounded-xl border border-outline-variant flex flex-col items-center justify-center gap-xs hover:bg-surface-container transition-all duration-200 active:scale-[0.98]">
<span class="font-headline-sm text-headline-sm text-on-surface">हिन्दी</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Hindi</span>
</button>
<!-- Card 3 (Bengali) -->
<button class="bg-surface-container-lowest p-lg rounded-xl border border-outline-variant flex flex-col items-center justify-center gap-xs hover:bg-surface-container transition-all duration-200 active:scale-[0.98]">
<span class="font-headline-sm text-headline-sm text-on-surface">বাংলা</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Bengali</span>
</button>
<!-- Card 4 (Marathi) -->
<button class="bg-surface-container-lowest p-lg rounded-xl border border-outline-variant flex flex-col items-center justify-center gap-xs hover:bg-surface-container transition-all duration-200 active:scale-[0.98]">
<span class="font-headline-sm text-headline-sm text-on-surface">मराठी</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Marathi</span>
</button>
<!-- Card 5 (Kannada) -->
<button class="bg-surface-container-lowest p-lg rounded-xl border border-outline-variant flex flex-col items-center justify-center gap-xs hover:bg-surface-container transition-all duration-200 active:scale-[0.98]">
<span class="font-headline-sm text-headline-sm text-on-surface">ಕನ್ನಡ</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Kannada</span>
</button>
<!-- Card 6 (Tamil) -->
<button class="bg-surface-container-lowest p-lg rounded-xl border border-outline-variant flex flex-col items-center justify-center gap-xs hover:bg-surface-container transition-all duration-200 active:scale-[0.98]">
<span class="font-headline-sm text-headline-sm text-on-surface">தமிழ்</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Tamil</span>
</button>
<!-- Card 7 (Malayalam) -->
<button class="bg-surface-container-lowest p-lg rounded-xl border border-outline-variant flex flex-col items-center justify-center gap-xs hover:bg-surface-container transition-all duration-200 active:scale-[0.98]">
<span class="font-headline-sm text-headline-sm text-on-surface">മലയാളം</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Malayalam</span>
</button>
<!-- Card 8 (Telugu) -->
<button class="bg-surface-container-lowest p-lg rounded-xl border border-outline-variant flex flex-col items-center justify-center gap-xs hover:bg-surface-container transition-all duration-200 active:scale-[0.98]">
<span class="font-headline-sm text-headline-sm text-on-surface">తెలుగు</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Telugu</span>
</button>

<!-- Illustration / Empty State Visual -->

<div class="w-24 h-24 bg-primary-container/10 rounded-full flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="translate">translate</span>
</div>

<!-- Footer Area -->
<footer class="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-md px-screen-margin py-lg border-t border-outline-variant/30 flex flex-col items-center gap-sm">
<p class="font-body-sm text-body-sm text-on-surface-variant text-center max-w-xs">
            The app will restart to apply the language change.
        </p>
<!-- Primary Action Button (Standard Pattern) -->
<button class="w-full max-w-sm bg-primary text-on-primary py-4 px-btn-h rounded-xl font-title-sm text-title-sm hover:brightness-110 active:scale-[0.98] transition-all shadow-sm">
            Save Preference
        </button>
</footer>
