<body class="bg-surface text-on-background min-h-screen flex flex-col">
<nav class="bg-[#faf9fd] dark:bg-[#121316] border-b border-[#c4c6cf] dark:border-[#424752] flex justify-between items-center w-full px-6 h-16 sticky top-0 z-50">
<div class="flex items-center gap-4">
<button class="text-[#1565c0] dark:text-[#a9c7ff] hover:bg-[#f4f3f7] dark:hover:bg-[#1a1b1e] p-2 rounded-full transition-all active:opacity-80 active:scale-95">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-['Work_Sans'] font-bold text-[22px] leading-[28px] text-[#1a1c1e] dark:text-[#f1f0f4]">Add Customer</h1>
</div>
</nav>
<main class="flex-1 overflow-y-auto px-screen-margin py-xl">
<div class="max-w-md mx-auto space-y-section-gap">
<div class="space-y-sm">
<label class="block font-title-sm text-on-surface font-bold">Name *</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="person">person</span>
</div>
<input class="w-full h-[56px] pl-[48px] pr-input-h bg-surface-container-low border-none rounded-xl font-body-md text-on-surface placeholder:text-on-surface-variant focus:ring-2 focus:ring-primary-container transition-all" placeholder="Full name or business name" type="text"/>
</div>
</div>
<div class="space-y-sm">
<label class="block font-title-sm text-on-surface font-bold">Phone Number</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="phone">phone</span>
<span class="ml-2 font-body-md text-on-surface-variant">+91</span>
</div>
<input class="w-full h-[56px] pl-[84px] pr-input-h bg-surface-container-low border-none rounded-xl font-body-md text-on-surface placeholder:text-on-surface-variant focus:ring-2 focus:ring-primary-container transition-all" placeholder="98765 43210" type="tel"/>
</div>
</div>
<div class="space-y-sm">
<label class="block font-title-sm text-on-surface font-bold">Opening Balance</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="font-title-md text-on-surface-variant">₹</span>
</div>
<input class="w-full h-[56px] pl-[36px] pr-input-h bg-surface-container-low border-none rounded-xl font-body-md text-on-surface focus:ring-2 focus:ring-primary-container transition-all" step="0.01" type="number" value="0.00"/>
</div>
</div>
<div class="space-y-md">
<header class="font-label-lg text-on-surface-variant">Who owes whom?</header>
<div class="flex gap-md">
<button class="flex-1 py-btn-v px-btn-h bg-secondary text-white rounded-xl font-title-sm flex items-center justify-center gap-xs shadow-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_downward">arrow_downward</span>
            They owe me
          </button>
<button class="flex-1 py-btn-v px-btn-h border border-outline-variant text-on-surface-variant rounded-xl font-title-sm flex items-center justify-center gap-xs active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_upward">arrow_upward</span>
            I owe them
          </button>
</div>
<p class="font-body-sm text-on-surface-variant">Set this if they have an existing balance from before.</p>
</div>
<div class="mt-section-gap p-lg bg-surface-container rounded-xl flex items-start gap-md">
<div class="p-base bg-primary/10 rounded-lg">
<span class="material-symbols-outlined text-primary" data-icon="info">info</span>
</div>
<div>
<h4 class="font-title-sm text-on-surface">Quick Tip</h4>
<p class="font-body-sm text-on-surface-variant">Keep your records clean by adding customers before transactions.</p>
</div>
</div>
</div>
</main>
<footer class="bg-surface px-screen-margin py-lg pb-safe">
<div class="max-w-md mx-auto">
<button class="w-full h-[56px] bg-primary-container text-white font-title-md rounded-full shadow-lg hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
        Add Customer
      </button>
</div>
</footer>
