<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Add Transaction - KhataPro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

                    "surface-container-low": "#f4f3f7",

                    "on-tertiary": "#ffffff",

                    "secondary": "#1b6d24",
                    "inverse-on-surface": "#f1f0f4",
                    "on-primary-container": "#dae5ff",
                    "on-surface-variant": "#424752",
                    "on-error": "#ffffff",
                    "on-primary": "#ffffff",

                    "income-container": "#A3F69C",
                    "surface-container-highest": "#e3e2e6",

            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",

                    "full": "9999px"

            "spacing": {

                    "screen-margin": "24px",
                    "section-gap": "32px",
                    "md": "16px",

                    "btn-v": "20px",

          },
        },

<style>
        body { font-family: 'Work Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .tap-highlight-transparent { -webkit-tap-highlight-color: transparent; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-[#faf9fd] dark:bg-[#121316] border-b border-[#C4C6CF] dark:border-[#44474E] shadow-none">
<div class="flex items-center justify-between px-6 h-16 w-full">
<h1 class="font-['Work_Sans'] text-[24px] font-bold leading-8 tracking-tight text-[#1565C0] dark:text-[#a9c7ff]">
                Add Transaction
            </h1>
<button class="text-[#424752] dark:text-[#c4c6cf] hover:bg-[#EFEDF1] dark:hover:bg-[#2f3033] transition-colors active:scale-95 duration-200 ease-in-out p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-16 pb-32 overflow-y-auto px-screen-margin pt-section-gap max-w-2xl mx-auto w-full">
<!-- Toggle Chips Row -->
<div class="flex w-full rounded-xl border border-outline-variant overflow-hidden mb-section-gap">
<button class="flex-1 flex items-center justify-center gap-2 bg-secondary py-4 text-on-secondary font-label-lg text-label-lg active:opacity-90 transition-all">
<span class="material-symbols-outlined text-[20px]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                Got paid
            </button>
<button class="flex-1 flex items-center justify-center gap-2 bg-transparent py-4 text-on-surface-variant font-label-lg text-label-lg hover:bg-surface-container transition-all">
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_upward">arrow_upward</span>
                Paid out
            </button>
</div>
<!-- Amount Field Section -->
<div class="mb-section-gap w-full">
<div class="flex items-baseline border-b-2 border-outline-variant focus-within:border-primary transition-all pb-2">
<span class="font-headline-lg text-headline-lg text-primary mr-2">₹</span>
<input class="flex-1 bg-transparent border-none p-0 focus:ring-0 font-display-md text-display-md font-bold text-on-surface placeholder:text-outline-variant" placeholder="0" type="text" value="1,250"/>
</div>
</div>
<!-- Form Fields Grid -->
<div class="space-y-lg">
<!-- Customer Name Field -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant block">Customer Name</label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container-high rounded-xl px-input-h border-none focus:ring-2 focus:ring-primary transition-all text-body-lg font-body-lg text-on-surface placeholder:text-outline" placeholder="Select or type name" type="text"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-primary p-2 hover:bg-primary-container/10 rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
</button>
</div>
</div>
<!-- Date Field -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant block">Date</label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container-high rounded-xl px-input-h border-none focus:ring-2 focus:ring-primary transition-all text-body-lg font-body-lg text-on-surface" readonly="" type="text" value="Today, Apr 26"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant p-2 hover:bg-surface-variant rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
</button>
</div>
</div>
<!-- Note Field -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant block">Note (optional)</label>
<textarea class="w-full bg-surface-container-high rounded-xl px-input-h py-input-v border-none focus:ring-2 focus:ring-primary transition-all text-body-lg font-body-lg text-on-surface placeholder:text-outline resize-none" placeholder="e.g. March dues, advance payment..." rows="3"></textarea>
</div>
<!-- Asymmetric Attachment Card -->
<div class="flex items-center gap-4 p-lg bg-surface-container-low rounded-xl border border-dashed border-outline-variant hover:bg-surface-container transition-all cursor-pointer group">
<div class="w-12 h-12 rounded-lg bg-primary-container/10 flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="add_a_photo">add_a_photo</span>
</div>
<div class="flex-1">
<p class="font-title-sm text-title-sm text-on-surface">Add Bill Photo</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">Max size 5MB • JPG, PNG</p>
</div>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full p-screen-margin bg-gradient-to-t from-background via-background to-transparent z-50">
<div class="max-w-2xl mx-auto">
<button class="w-full bg-primary text-on-primary h-14 rounded-full font-label-lg text-label-lg shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="save">save</span>
                Save Transaction
            </button>
</div>
</div>
<!-- Background Decoration (Asymmetric Element) -->
<div class="fixed top-24 -right-12 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10 pointer-events-none"></div>
<div class="fixed bottom-32 -left-12 w-48 h-48 bg-secondary/5 rounded-full blur-3xl -z-10 pointer-events-none"></div>
</body></html>
